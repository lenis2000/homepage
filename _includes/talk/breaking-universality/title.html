<!-- APPROVED: Do not modify without explicit user request -->
<section class="slide slide-center" id="title" data-title="Title" style="display: flex; flex-direction: row; align-items: center; padding: 3vh 3vw;">
    <!-- Left: text -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: center;">
        <h1 style="font-size: clamp(2.5rem, 3.5vw, 4rem); line-height: 1.2;">Breaking Universality<br> in Dimer Models</h1>

        <p class="author" style="margin-top: 2vh; font-size: clamp(1.5rem, 2.5vw, 2.2rem);">Leonid Petrov</p>
        <p style="font-size: clamp(1.2rem, 2vw, 1.8rem); color: var(--slide-muted);">University of Virginia</p>
        <br><br><br>
        <p style="font-size: clamp(1.1rem, 1.8vw, 1.5rem); margin-top: 0.5vh;">Joint work with
            <strong>Alisa Knizel</strong> (Columbia)<br>
            and <strong>Alexey Bufetov</strong>,
            <strong>Panagiotis Zografos</strong> (Leipzig)
        </p>
    </div>

    <!-- Right: Washington Monument column — (10, 10, 80) hexagonal lozenge tiling, cropped to the top portion (frame drawn in JS on top of lozenges) -->
    <div style="display: flex; align-items: center; justify-content: center; padding-left: 2vw;">
        <canvas id="title-canvas" width="1200" height="1600" style="cursor: pointer; height: 78vh; width: auto; display: block;"></canvas>
    </div>

    <!-- Funding acknowledgment logos -->
    <div style="position: absolute; bottom: 2vh; left: 2vw; display: flex; align-items: center; gap: 2vw;">
        <img src="images/nsf-logo.png" alt="NSF" style="height: 15vh;">
        <img src="images/simons-logo.svg" alt="Simons Foundation" style="height: 6vh;">
    </div>

    <!-- Loading progress bar (disappears when loaded) -->
    <div id="asset-loader" style="position: absolute; bottom: 10vh; left: 50%; transform: translateX(-50%); text-align: center; transition: opacity 0.5s;">
        <div style="width: 200px; height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden;">
            <div id="asset-loader-bar" style="height: 100%; width: 0%; background: var(--slide-accent); transition: width 0.2s;"></div>
        </div>
        <div id="asset-loader-text" style="font-size: 0.7rem; color: var(--slide-muted); margin-top: 0.5vh;">Loading...</div>
    </div>
</section>
