---
title: arXiv Source Viewer
layout: default
permalink: /arxiv/source/
sitemap: false
no-math: true
---

<script>window.Prism = window.Prism || {}; Prism.manual = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-latex.min.js"></script>


<div id="source-loading">Loading source files...</div>
<div id="source-error" hidden>
  <div class="alert alert-warning">
    <strong>No source files found</strong> for this paper.
    <a id="error-arxiv-link" href="#" target="_blank">View on arXiv</a>
  </div>
</div>

<div id="source-viewer" hidden class="tex2jax_ignore">
  <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap">
    <div>
      <h1 id="source-title" class="h4 mb-1"></h1>
      <div class="text-muted" id="source-meta"></div>
    </div>
    <div class="d-flex gap-2 mt-2">
      <a id="source-arxiv-link" href="#" target="_blank" class="btn btn-sm btn-outline-secondary">arXiv</a>
      <a id="source-pdf-link" href="#" target="_blank" class="btn btn-sm btn-outline-primary">PDF</a>
    </div>
  </div>

  <!-- File list sidebar + content area -->
  <div class="row">
    <div class="col-md-3 mb-3">
      <div class="card">
        <div class="card-header"><strong>Files</strong> <span id="file-count" class="text-muted"></span></div>
        <ul id="file-list" class="list-group list-group-flush" style="font-size:0.88em"></ul>
      </div>
    </div>
    <div class="col-md-9">
      <div id="file-content">
        <p class="text-muted">Select a file to view</p>
      </div>
    </div>
  </div>
</div>


<style>
  #file-list .list-group-item {
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    border-left: 3px solid transparent;
  }
  #file-list .list-group-item:hover {
    background-color: #f0f0f0;
  }
  #file-list .list-group-item.active {
    background-color: #e8f4f8;
    border-left-color: #1a5276;
    color: #1a5276;
    font-weight: 700;
  }
  .file-icon {
    display: inline-block;
    width: 1.5em;
    text-align: center;
    font-size: 0.85em;
    color: #666;
  }
  .file-size {
    float: right;
    color: #999;
    font-size: 0.85em;
  }
  /* Code viewer */
  .source-code-container {
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .source-code-container pre {
    margin: 0;
    padding: 1rem;
    font-size: 0.85rem;
    font-family: 'Iosevka Fixed', 'Courier New', monospace;
    background-color: #fdf6e3;
    color: #657b83;
    max-height: 80vh;
    overflow: auto;
    line-height: 1.45;
    tab-size: 4;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .source-code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0.75rem;
    background: #f0f0f0;
    border-bottom: 1px solid #ddd;
    font-size: 0.88em;
  }
  .source-code-header .btn { font-size: 0.82em; }
  /* Soft wrap */
  .soft-wrap pre[class*="language-"] {
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Section folding for .tex — content stays in DOM for Cmd-F */
  .tex-section {
    border-left: 2px solid #eee8d5;
    margin-left: 0;
  }
  .tex-section-header {
    cursor: pointer;
    padding: 0.3rem 0.6rem;
    background: #eee8d5;
    border-bottom: 1px solid #ddd;
    font-family: 'Iosevka Fixed', 'Courier New', monospace;
    font-size: 0.88rem;
    font-weight: 700;
    color: #268bd2;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 0.5em;
  }
  .tex-section-header::before {
    content: '▶';
    font-size: 0.65em;
    transition: transform 0.15s;
    display: inline-block;
  }
  .tex-section.open .tex-section-header::before {
    transform: rotate(90deg);
  }
  .tex-section-header:hover {
    background: #fdf6e3;
  }
  .tex-section-body {
    /* Collapsed: content stays in DOM for Cmd-F searchability */
    height: 1px;
    overflow: hidden;
    opacity: 0;
    position: relative;
  }
  .tex-section.open .tex-section-body {
    height: auto;
    overflow: visible;
    opacity: 1;
  }
  /* Image viewer */
  .source-image-container {
    text-align: center;
    padding: 1rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fafafa;
  }
  .source-image-container img {
    max-width: 100%;
    max-height: 70vh;
  }
  /* PDF embed */
  .source-pdf-container {
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
  }
  .source-pdf-container iframe {
    width: 100%;
    height: 80vh;
    border: none;
  }
  /* Dark mode */
  [data-theme="dark"] #file-list .list-group-item:hover { background-color: var(--bg-tertiary, #2a2a2a); }
  [data-theme="dark"] #file-list .list-group-item.active { background-color: rgba(26, 82, 118, 0.2); border-left-color: #3498db; color: #3498db; }
  [data-theme="dark"] .source-code-container pre { background-color: #263238; color: #B0BEC5; }

  /* Prism token colors — Light: Solarized Light */
  .token.comment, .token.prolog { color: #93a1a1; font-style: italic; }
  .token.keyword, .token.tag { color: #859900; font-weight: bold; }
  .token.function, .token.selector { color: #268bd2; }
  .token.string, .token.attr-value { color: #2aa198; }
  .token.number { color: #d33682; }
  .token.operator { color: #657b83; }
  .token.punctuation { color: #586e75; }
  .token.property, .token.constant { color: #cb4b16; }
  .token.class-name { color: #b58900; }
  .token.important { color: #dc322f; font-weight: bold; }
  /* Prism token colors — Dark: hybrid_material */
  [data-theme="dark"] .token.comment, [data-theme="dark"] .token.prolog { color: #87CEFA; font-style: italic; }
  [data-theme="dark"] .token.keyword, [data-theme="dark"] .token.tag { color: #32CD32; font-weight: bold; }
  [data-theme="dark"] .token.function, [data-theme="dark"] .token.selector { color: #F0E68C; }
  [data-theme="dark"] .token.string, [data-theme="dark"] .token.attr-value { color: #00FA9A; }
  [data-theme="dark"] .token.number { color: #F0E68C; }
  [data-theme="dark"] .token.operator { color: #B0BEC5; }
  [data-theme="dark"] .token.punctuation { color: #87CEFA; }
  [data-theme="dark"] .token.property, [data-theme="dark"] .token.constant { color: #F0E68C; }
  [data-theme="dark"] .token.class-name { color: #32CD32; }
  [data-theme="dark"] .token.important { color: #FF6B6B; font-weight: bold; }
  [data-theme="dark"] .source-code-header { background: var(--bg-tertiary, #2a2a2a); border-bottom-color: var(--border-color); }
  [data-theme="dark"] .tex-section-header { background: #37474F; border-bottom-color: #455A64; color: #87CEFA; }
  [data-theme="dark"] .tex-section-header:hover { background: #455A64; }
  [data-theme="dark"] .tex-section { border-left-color: #455A64; }
  [data-theme="dark"] .source-image-container { background: var(--bg-secondary, #1e1e1e); border-color: var(--border-color); }
  [data-theme="dark"] .source-pdf-container { border-color: var(--border-color); }
</style>


<script>
(function() {
  var STORAGE_URL = '{{ site.storage_url }}';

  var params = new URLSearchParams(window.location.search);
  var arxivId = params.get('id');
  if (!arxivId) {
    document.getElementById('source-loading').textContent = 'No paper ID specified. Use ?id=XXXX.XXXXX';
    return;
  }

  var safeId = arxivId.replace(/\//g, '-');
  var baseUrl = STORAGE_URL + '/arxiv-sources/' + safeId + '/';

  // Set up links immediately
  document.getElementById('source-arxiv-link').href = 'https://arxiv.org/abs/' + arxivId;
  document.getElementById('source-pdf-link').href = 'https://arxiv.org/pdf/' + arxivId;
  document.getElementById('error-arxiv-link').href = 'https://arxiv.org/abs/' + arxivId;

  // Fetch per-paper file listing directly from S3 (avoids loading full 1.9MB manifest)
  fetch(baseUrl + '_files.json')
    .then(function(r) {
      if (!r.ok) throw new Error('No source listing');
      return r.json();
    })
    .then(function(files) {
      if (!files || files.length === 0) {
        document.getElementById('source-loading').hidden = true;
        document.getElementById('source-error').hidden = false;
        return;
      }

      document.getElementById('source-loading').hidden = true;
      document.getElementById('source-viewer').hidden = false;
      document.getElementById('source-title').textContent = arxivId;
      document.getElementById('source-meta').textContent = files.length + ' file' + (files.length === 1 ? '' : 's');
      document.getElementById('file-count').textContent = '(' + files.length + ')';
      document.title = arxivId + ' — Source Viewer';

      var fileList = document.getElementById('file-list');
      files.forEach(function(f) {
        var li = document.createElement('li');
        li.className = 'list-group-item';
        li.innerHTML = '<span class="file-icon">' + getFileIcon(f.name) + '</span>' +
                        escapeHtml(f.name) +
                        '<span class="file-size">' + formatSize(f.size) + '</span>';
        li.dataset.filename = f.name;
        li.addEventListener('click', function() {
          selectFile(f.name, files);
        });
        fileList.appendChild(li);
      });

      // Auto-select first .tex file, or first file
      var firstTex = files.find(function(f) { return f.name.endsWith('.tex'); });
      selectFile((firstTex || files[0]).name, files);
    })
    .catch(function(err) {
      document.getElementById('source-loading').textContent = 'Error loading manifest: ' + err.message;
    });

  var wrapEnabled = true;

  // Cmd-F: expand all collapsed sections so browser find works
  // Escape: re-collapse auto-expanded; double-Escape: collapse ALL
  var lastEscapeTime = 0;
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      document.querySelectorAll('.tex-section:not(.open)').forEach(function(s) {
        s.classList.add('open');
        s.dataset.autoExpanded = '1';
      });
    }
    if (e.key === 'Escape') {
      var now = Date.now();
      if (now - lastEscapeTime < 400) {
        // Double-Escape: collapse ALL sections
        document.querySelectorAll('.tex-section.open').forEach(function(s) {
          s.classList.remove('open');
          delete s.dataset.autoExpanded;
        });
      } else {
        // Single Escape: collapse only auto-expanded
        document.querySelectorAll('.tex-section[data-auto-expanded]').forEach(function(s) {
          s.classList.remove('open');
          delete s.dataset.autoExpanded;
        });
      }
      lastEscapeTime = now;
    }
  });

  function selectFile(filename, files) {
    // Update active state in file list
    var items = document.querySelectorAll('#file-list .list-group-item');
    items.forEach(function(item) {
      item.classList.toggle('active', item.dataset.filename === filename);
    });

    var content = document.getElementById('file-content');
    var url = baseUrl + filename;
    var ext = filename.split('.').pop().toLowerCase();

    // Update URL without reload
    var newUrl = window.location.pathname + '?id=' + arxivId + '&file=' + encodeURIComponent(filename);
    history.replaceState(null, '', newUrl);

    if (isImageFile(ext)) {
      content.innerHTML =
        '<div class="source-code-header">' +
          '<strong>' + escapeHtml(filename) + '</strong>' +
          '<a href="' + url + '" download class="btn btn-sm btn-outline-secondary">Download</a>' +
        '</div>' +
        '<div class="source-image-container">' +
          '<img src="' + url + '" alt="' + escapeHtml(filename) + '">' +
        '</div>';
    } else if (ext === 'pdf') {
      content.innerHTML =
        '<div class="source-code-header">' +
          '<strong>' + escapeHtml(filename) + '</strong>' +
          '<a href="' + url + '" download class="btn btn-sm btn-outline-secondary">Download</a>' +
        '</div>' +
        '<div class="source-pdf-container">' +
          '<iframe src="' + url + '"></iframe>' +
        '</div>';
    } else if (isTextFile(ext)) {
      content.innerHTML = '<div class="source-code-header">' +
        '<strong>' + escapeHtml(filename) + '</strong>' +
        '<span>' +
          '<button id="wrap-toggle" class="btn btn-sm btn-outline-secondary">' +
            'Wrap: ' + (wrapEnabled ? 'On' : 'Off') +
          '</button> ' +
          '<a href="' + url + '" download class="btn btn-sm btn-outline-secondary">Download</a>' +
        '</span>' +
      '</div>' +
      '<div id="code-area" class="source-code-container' + (wrapEnabled ? ' soft-wrap' : '') + '">' +
        '<div style="padding:1rem;color:#666">Loading...</div>' +
      '</div>';

      document.getElementById('wrap-toggle').addEventListener('click', function() {
        wrapEnabled = !wrapEnabled;
        this.textContent = 'Wrap: ' + (wrapEnabled ? 'On' : 'Off');
        document.getElementById('code-area').classList.toggle('soft-wrap', wrapEnabled);
      });

      fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(text) {
          var codeArea = document.getElementById('code-area');
          if (ext === 'tex' || ext === 'sty' || ext === 'cls') {
            flattenInputs(text, files, baseUrl).then(function(flattened) {
              renderTexLazy(codeArea, flattened);
            });
          } else {
            var pre = document.createElement('pre');
            pre.textContent = text;
            codeArea.innerHTML = '';
            codeArea.appendChild(pre);
          }
        })
        .catch(function(err) {
          document.getElementById('code-area').innerHTML =
            '<div style="padding:1rem;color:#c00">Error loading file: ' + err.message + '</div>';
        });
    } else {
      // Binary or unknown — just offer download
      content.innerHTML =
        '<div class="source-code-header">' +
          '<strong>' + escapeHtml(filename) + '</strong>' +
        '</div>' +
        '<div style="padding:2rem;text-align:center">' +
          '<p>This file type cannot be previewed.</p>' +
          '<a href="' + url + '" download class="btn btn-primary">Download ' + escapeHtml(filename) + '</a>' +
        '</div>';
    }
  }

  function flattenInputs(text, files, base, depth) {
    if (!depth) depth = 0;
    if (depth > 5) return Promise.resolve(text);
    // Build set of available filenames for resolution
    var available = {};
    files.forEach(function(f) { available[f.name] = true; });
    // Find \input{...} — skip if preceded by % on the same line
    var inputRe = /\\input\{([^}]+)\}/g;
    var matches = [];
    var m;
    while ((m = inputRe.exec(text)) !== null) {
      // Check that no % appears before this on the same line (i.e., not commented out)
      var lineStart = text.lastIndexOf('\n', m.index) + 1;
      var before = text.substring(lineStart, m.index);
      if (before.indexOf('%') !== -1) continue;
      var ref = m[1].trim();
      // Resolve filename: try as-is, then with .tex
      var resolved = available[ref] ? ref : available[ref + '.tex'] ? ref + '.tex' : null;
      if (resolved) {
        matches.push({ start: m.index, end: m.index + m[0].length, file: resolved });
      }
    }
    if (matches.length === 0) return Promise.resolve(text);
    // Fetch all referenced files in parallel
    var fetches = matches.map(function(mi) {
      return fetch(base + mi.file)
        .then(function(r) { return r.ok ? r.text() : '% [flatten error: could not load ' + mi.file + ']'; })
        .catch(function() { return '% [flatten error: could not load ' + mi.file + ']'; });
    });
    return Promise.all(fetches).then(function(contents) {
      // Replace from end to preserve indices
      var result = text;
      for (var i = matches.length - 1; i >= 0; i--) {
        var header = '% ══════ ' + matches[i].file + ' ══════\n';
        result = result.substring(0, matches[i].start) + header + contents[i] + '\n' + result.substring(matches[i].end);
      }
      // Recurse for nested inputs
      return flattenInputs(result, files, base, depth + 1);
    });
  }

  function renderTexLazy(container, text) {
    // Split into preamble + document body (LaTeX or Plain TeX)
    var docIdx = text.indexOf('\\begin{document}');
    var preamble = '';
    var body = text;
    if (docIdx !== -1) {
      preamble = text.substring(0, docIdx);
      body = text.substring(docIdx);
    }

    // Find all section positions — LaTeX, Plain TeX (\beginsection), AMS-TeX (\head)
    var sectionRegex = /^(\\(?:section|subsection|subsubsection)\*?\{[^}]*\}|\\beginsection\s*\{[^}]*\}|\\beginsection\s+\S[^\n]*|\\head\{[^}]*\}|\\subhead\{[^}]*\})/gm;
    var sections = [];
    var match;
    while ((match = sectionRegex.exec(body)) !== null) {
      sections.push({ index: match.index, header: match[1] });
    }

    var parts = [];
    if (sections.length === 0) {
      parts.push({ header: null, text: body });
    } else {
      // Text before first section
      if (sections[0].index > 0) {
        parts.push({ header: null, text: body.substring(0, sections[0].index) });
      }
      for (var si = 0; si < sections.length; si++) {
        var start = sections[si].index;
        var end = si + 1 < sections.length ? sections[si + 1].index : body.length;
        parts.push({ header: sections[si].header, text: body.substring(start, end) });
      }
    }

    container.innerHTML = '';

    // Helper: content always in DOM for Cmd-F searchability
    function makeSection(label, rawText, startOpen, indent) {
      var section = document.createElement('div');
      section.className = 'tex-section' + (startOpen ? ' open' : '');
      if (indent) section.style.marginLeft = indent;

      var header = document.createElement('div');
      header.className = 'tex-section-header';
      header.textContent = label;

      var bodyDiv = document.createElement('div');
      bodyDiv.className = 'tex-section-body';

      var pre = document.createElement('pre');
      var code = document.createElement('code');
      code.textContent = rawText;
      pre.appendChild(code);
      bodyDiv.appendChild(pre);

      header.addEventListener('click', function() {
        var wasOpen = section.classList.contains('open');
        section.classList.toggle('open');
        if (wasOpen) delete section.dataset.autoExpanded;
        // Highlight on first open
        if (!wasOpen && window.Prism && !code.dataset.highlighted) {
          code.className = 'language-latex';
          Prism.highlightElement(code);
          code.dataset.highlighted = '1';
        }
      });

      section.appendChild(header);
      section.appendChild(bodyDiv);
      return section;
    }

    // Preamble (collapsed by default)
    if (preamble) {
      container.appendChild(makeSection('Preamble', preamble, false, ''));
    }

    // Body parts
    parts.forEach(function(part) {
      if (part.header) {
        // Extract display name from various TeX dialects
        var nameMatch = part.header.match(/\\(?:section|subsection|subsubsection)\*?\{([^}]*)\}/) ||
                        part.header.match(/\\beginsection\s*\{([^}]*)\}/) ||
                        part.header.match(/\\beginsection\s+(.+)/) ||
                        part.header.match(/\\(?:sub)?head\{([^}]*)\}/);
        var displayName = nameMatch ? nameMatch[1].trim() : part.header;
        var level = part.header.startsWith('\\subsubsection') ? 'subsubsection' :
                    (part.header.startsWith('\\subsection') || part.header.startsWith('\\subhead')) ? 'subsection' : 'section';
        var indent = level === 'subsubsection' ? '2em' :
                     level === 'subsection' ? '1em' : '';
        container.appendChild(makeSection(displayName, part.text, false, indent));
      } else {
        // Intro text before first section — render immediately
        var pre = document.createElement('pre');
        var code = document.createElement('code');
        code.textContent = part.text;
        pre.appendChild(code);
        container.appendChild(pre);
      }
    });
  }

  function isImageFile(ext) {
    return ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].indexOf(ext) !== -1;
  }

  function isTextFile(ext) {
    return ['tex', 'sty', 'cls', 'bbl', 'bib', 'bst', 'txt', 'md',
            'py', 'c', 'h', 'cpp', 'hpp', 'java', 'js', 'json', 'xml',
            'html', 'css', 'sh', 'pl', 'rb', 'r', 'asy', 'mp', 'mf',
            'def', 'cfg', 'dtx', 'ins', 'fd', 'clo', 'ldf',
            'tikz', 'pgf', 'raw'].indexOf(ext) !== -1;
  }


  function getFileIcon(name) {
    var ext = name.split('.').pop().toLowerCase();
    if (ext === 'tex' || ext === 'sty' || ext === 'cls') return '&#120139;';
    if (ext === 'bbl' || ext === 'bib' || ext === 'bst') return '&#128218;';
    if (ext === 'pdf') return '&#128196;';
    if (isImageFile(ext)) return '&#128444;';
    if (ext === 'eps' || ext === 'ps') return '&#128444;';
    return '&#128196;';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>
