# arXiv Feed — Author Configuration
# Each author entry is used for:
#   1. Deterministic name matching against arXiv results
#   2. AI disambiguation when needed
#
# Fields:
#   name: Display name
#   arxiv_names: List of arXiv author ID patterns (Surname_Initial)
#   affiliation: Current institution (for disambiguation)
#   topics: Research topics (for AI context)
#   disambiguation: Hint for AI to distinguish from namesakes
#   high_ambiguity: Force AI review even for category-matching papers

categories:
  - math.PR
  - math-ph
  - math.RT
  - math.QA
  - math.CO

